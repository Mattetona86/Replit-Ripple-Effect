openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: market
    description: Market data and technical analysis operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /market/tickers/search:
    get:
      operationId: searchTickers
      tags: [market]
      summary: Autocomplete search over US stock and ETF tickers
      parameters:
        - name: query
          in: query
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: Matching tickers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TickerSearchResult"

  /market/stocks/fundamental-analysis:
    get:
      operationId: getFundamentalAnalysis
      tags: [market]
      summary: Fundamental analysis with scores, metrics, peer comparison, and AI explanation
      parameters:
        - name: symbol
          in: query
          required: true
          schema:
            type: string
        - name: language
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Language"
      responses:
        "200":
          description: Full fundamental analysis for the requested ticker
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FundamentalAnalysis"
        "404":
          description: Ticker not found or insufficient data

  /market/stocks/analysis:
    get:
      operationId: getStockAnalysis
      tags: [market]
      summary: Computed price series, technical indicators, and plain-language educational read for a ticker
      parameters:
        - name: symbol
          in: query
          required: true
          schema:
            type: string
        - name: timeframe
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Timeframe"
        - name: language
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Language"
      responses:
        "200":
          description: Technical analysis for the requested ticker
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockAnalysis"
        "404":
          description: Ticker not found

  /market/saved:
    get:
      operationId: listSavedAnalyses
      tags: [market]
      summary: List the current user's saved analyses
      responses:
        "200":
          description: Saved analyses, most recently saved first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SavedAnalysis"
    post:
      operationId: saveAnalysis
      tags: [market]
      summary: Save (or re-save) a ticker's analysis snapshot for the current user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveAnalysisRequest"
      responses:
        "200":
          description: The saved analysis record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedAnalysis"

  /market/saved/{id}:
    delete:
      operationId: deleteSavedAnalysis
      tags: [market]
      summary: Remove a saved analysis
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Timeframe:
      type: string
      enum: ["1D", "1W", "1M", "3M", "1Y", "5Y"]

    Language:
      type: string
      enum: ["en", "it"]

    TickerSearchResult:
      type: object
      required: [symbol, name, exchange]
      properties:
        symbol:
          type: string
        name:
          type: string
        exchange:
          type: string

    Candle:
      type: object
      required: [time, open, high, low, close, volume]
      properties:
        time:
          type: integer
          description: Unix timestamp in seconds
        open:
          type: number
        high:
          type: number
        low:
          type: number
        close:
          type: number
        volume:
          type: number

    IndicatorPoint:
      type: object
      required: [time, value]
      properties:
        time:
          type: integer
        value:
          type: number

    MacdPoint:
      type: object
      required: [time, macd, signal, histogram]
      properties:
        time:
          type: integer
        macd:
          type: number
        signal:
          type: number
        histogram:
          type: number

    SwingPoint:
      type: object
      required: [time, price, type]
      properties:
        time:
          type: integer
        price:
          type: number
        type:
          type: string
          enum: ["high", "low"]

    Level:
      type: object
      required: [price, type]
      properties:
        price:
          type: number
        type:
          type: string
          enum: ["support", "resistance"]

    MarketStructure:
      type: string
      enum:
        [
          "higher_highs_higher_lows",
          "lower_highs_lower_lows",
          "sideways",
          "mixed",
        ]

    IndicatorSignal:
      type: string
      enum: ["bullish", "bearish", "neutral"]

    IndicatorRead:
      type: object
      required: [key, label, currentValueLabel, signal, explanation]
      properties:
        key:
          type: string
        label:
          type: string
        currentValueLabel:
          type: string
        signal:
          $ref: "#/components/schemas/IndicatorSignal"
        explanation:
          type: string

    IllustrativeSetup:
      type: object
      properties:
        entry:
          type: ["number", "null"]
        entryReasoning:
          type: ["string", "null"]
        stop:
          type: ["number", "null"]
        stopReasoning:
          type: ["string", "null"]
        target:
          type: ["number", "null"]
        targetReasoning:
          type: ["string", "null"]

    LeveledExplanation:
      type: object
      properties:
        support:
          type: ["number", "null"]
        supportReasoning:
          type: ["string", "null"]
        resistance:
          type: ["number", "null"]
        resistanceReasoning:
          type: ["string", "null"]
        ma200:
          type: ["number", "null"]
        ma200Reasoning:
          type: ["string", "null"]
        illustrativeSetup:
          oneOf:
            - $ref: "#/components/schemas/IllustrativeSetup"
            - type: "null"

    AnalysisExplanation:
      type: object
      required:
        [
          indicatorReads,
          bullishCase,
          bearishCase,
          summary,
          levels,
          disclaimer,
        ]
      properties:
        indicatorReads:
          type: array
          items:
            $ref: "#/components/schemas/IndicatorRead"
        bullishCase:
          type: string
        bearishCase:
          type: string
        summary:
          type: string
        levels:
          $ref: "#/components/schemas/LeveledExplanation"
        disclaimer:
          type: string

    StockAnalysis:
      type: object
      required:
        [
          symbol,
          name,
          exchange,
          timeframe,
          lastPrice,
          asOf,
          candles,
          volumeAvg20,
          sma50,
          sma200,
          ema20,
          ema50,
          rsi14,
          macd,
          swingPoints,
          marketStructure,
          supportLevels,
          resistanceLevels,
          unusualVolume,
          explanation,
        ]
      properties:
        symbol:
          type: string
        name:
          type: string
        exchange:
          type: string
        timeframe:
          $ref: "#/components/schemas/Timeframe"
        lastPrice:
          type: number
        asOf:
          type: string
          description: ISO timestamp of the underlying price data
        candles:
          type: array
          items:
            $ref: "#/components/schemas/Candle"
        volumeAvg20:
          type: array
          items:
            $ref: "#/components/schemas/IndicatorPoint"
        sma50:
          type: array
          items:
            $ref: "#/components/schemas/IndicatorPoint"
        sma200:
          type: array
          items:
            $ref: "#/components/schemas/IndicatorPoint"
        ema20:
          type: array
          items:
            $ref: "#/components/schemas/IndicatorPoint"
        ema50:
          type: array
          items:
            $ref: "#/components/schemas/IndicatorPoint"
        rsi14:
          type: array
          items:
            $ref: "#/components/schemas/IndicatorPoint"
        macd:
          type: array
          items:
            $ref: "#/components/schemas/MacdPoint"
        swingPoints:
          type: array
          items:
            $ref: "#/components/schemas/SwingPoint"
        marketStructure:
          $ref: "#/components/schemas/MarketStructure"
        supportLevels:
          type: array
          items:
            type: number
        resistanceLevels:
          type: array
          items:
            type: number
        unusualVolume:
          type: boolean
        explanation:
          $ref: "#/components/schemas/AnalysisExplanation"

    # ── Fundamental Analysis ───────────────────────────────────────────────────

    ScoreLabel:
      type: string
      enum: [very_strong, strong, neutral, weak, very_weak]

    Trend:
      type: string
      enum: [improving, declining, stable]

    EarningsQuality:
      type: string
      enum: [high, adequate, weak, very_weak]

    ValuationQuadrant:
      type: string
      enum: [quality_cheap, quality_expensive, weak_cheap, weak_expensive]

    GrowthMetric:
      type: object
      required: [isNm]
      properties:
        value:
          type: ["number", "null"]
        peerMedian:
          type: ["number", "null"]
        peerPercentile:
          type: ["number", "null"]
        trend:
          oneOf:
            - $ref: "#/components/schemas/Trend"
            - type: "null"
        isNm:
          type: boolean

    ValuationMultiple:
      type: object
      properties:
        value:
          type: ["number", "null"]
        peerMedian:
          type: ["number", "null"]
        peerPercentile:
          type: ["number", "null"]
        historicalMedian3y:
          type: ["number", "null"]
        historicalMedian5y:
          type: ["number", "null"]
        vsPeers:
          type: ["number", "null"]
        vsHistory3y:
          type: ["number", "null"]

    DimensionScore:
      type: object
      required: [score, label, labelEn, labelIt, keyDrivers]
      properties:
        score:
          type: number
        label:
          $ref: "#/components/schemas/ScoreLabel"
        labelEn:
          type: string
        labelIt:
          type: string
        keyDrivers:
          type: array
          items:
            type: string

    FundamentalScores:
      type: object
      required: [growth, profitability, cashFlow, financialStrength, capitalEfficiency, valuation, overall, overallLabel, overallLabelEn, overallLabelIt, confidenceLevel, coveragePct, metricsAvailable, metricsTotal]
      properties:
        growth:
          $ref: "#/components/schemas/DimensionScore"
        profitability:
          $ref: "#/components/schemas/DimensionScore"
        cashFlow:
          $ref: "#/components/schemas/DimensionScore"
        financialStrength:
          $ref: "#/components/schemas/DimensionScore"
        capitalEfficiency:
          $ref: "#/components/schemas/DimensionScore"
        valuation:
          $ref: "#/components/schemas/DimensionScore"
        overall:
          type: number
        overallLabel:
          $ref: "#/components/schemas/ScoreLabel"
        overallLabelEn:
          type: string
        overallLabelIt:
          type: string
        confidenceLevel:
          type: string
          enum: [high, medium, low]
        coveragePct:
          type: number
        metricsAvailable:
          type: integer
        metricsTotal:
          type: integer

    GrowthSection:
      type: object
      required: [revenueYoy, revenue3yCagr, revenue5yCagr, revenueQoQ, revenueYoYLatestQ, epsYoy, eps3yCagr, operatingIncomeYoy, netIncomeYoy, ocfYoy, fcfYoy, fcf3yCagr]
      properties:
        revenueTtm:
          type: ["number", "null"]
        revenueYoy:
          $ref: "#/components/schemas/GrowthMetric"
        revenue3yCagr:
          $ref: "#/components/schemas/GrowthMetric"
        revenue5yCagr:
          $ref: "#/components/schemas/GrowthMetric"
        revenueQoQ:
          $ref: "#/components/schemas/GrowthMetric"
        revenueYoYLatestQ:
          $ref: "#/components/schemas/GrowthMetric"
        epsDilutedTtm:
          type: ["number", "null"]
        epsYoy:
          $ref: "#/components/schemas/GrowthMetric"
        eps3yCagr:
          $ref: "#/components/schemas/GrowthMetric"
        operatingIncomeYoy:
          $ref: "#/components/schemas/GrowthMetric"
        netIncomeYoy:
          $ref: "#/components/schemas/GrowthMetric"
        ocfYoy:
          $ref: "#/components/schemas/GrowthMetric"
        fcfYoy:
          $ref: "#/components/schemas/GrowthMetric"
        fcf3yCagr:
          $ref: "#/components/schemas/GrowthMetric"

    ProfitabilitySection:
      type: object
      required: [grossMarginTrend, operatingMarginTrend, netMarginTrend, earningsQuality]
      properties:
        grossMarginTtm:
          type: ["number", "null"]
        grossMarginLastFy:
          type: ["number", "null"]
        grossMargin3yAvg:
          type: ["number", "null"]
        grossMarginTrend:
          oneOf:
            - $ref: "#/components/schemas/Trend"
            - type: "null"
        grossMarginVsPeers:
          type: ["number", "null"]
        operatingMarginTtm:
          type: ["number", "null"]
        operatingMarginLastFy:
          type: ["number", "null"]
        operatingMargin3yAvg:
          type: ["number", "null"]
        operatingMarginTrend:
          oneOf:
            - $ref: "#/components/schemas/Trend"
            - type: "null"
        operatingMarginVsPeers:
          type: ["number", "null"]
        ebitdaMarginTtm:
          type: ["number", "null"]
        netMarginTtm:
          type: ["number", "null"]
        netMarginLastFy:
          type: ["number", "null"]
        netMargin3yAvg:
          type: ["number", "null"]
        netMarginTrend:
          oneOf:
            - $ref: "#/components/schemas/Trend"
            - type: "null"
        fcfMarginTtm:
          type: ["number", "null"]
        roa:
          type: ["number", "null"]
        roe:
          type: ["number", "null"]
        roic:
          type: ["number", "null"]
        roeWarning:
          type: ["string", "null"]
        peerGrossMarginMedian:
          type: ["number", "null"]
        peerOperatingMarginMedian:
          type: ["number", "null"]
        peerRoicMedian:
          type: ["number", "null"]

    CashFlowSection:
      type: object
      required: [earningsQuality, earningsQualitySignals]
      properties:
        ocfTtm:
          type: ["number", "null"]
        capexTtm:
          type: ["number", "null"]
        fcfTtm:
          type: ["number", "null"]
        fcfPerShareTtm:
          type: ["number", "null"]
        fcfMarginTtm:
          type: ["number", "null"]
        cashConversionRatio:
          type: ["number", "null"]
        ocfToNetIncome:
          type: ["number", "null"]
        fcfToNetIncome:
          type: ["number", "null"]
        capexToRevenue:
          type: ["number", "null"]
        sbcTtm:
          type: ["number", "null"]
        sbcToRevenueTtm:
          type: ["number", "null"]
        earningsQuality:
          $ref: "#/components/schemas/EarningsQuality"
        earningsQualitySignals:
          type: array
          items:
            type: string

    FinancialStrengthSection:
      type: object
      required: [isNetCash, netDebtToEbitdaIsNm]
      properties:
        cash:
          type: ["number", "null"]
        totalDebt:
          type: ["number", "null"]
        netDebt:
          type: ["number", "null"]
        isNetCash:
          type: boolean
        debtToEquity:
          type: ["number", "null"]
        debtToAssets:
          type: ["number", "null"]
        netDebtToEbitda:
          type: ["number", "null"]
        netDebtToEbitdaIsNm:
          type: boolean
        currentRatio:
          type: ["number", "null"]
        quickRatio:
          type: ["number", "null"]
        interestCoverage:
          type: ["number", "null"]
        ocfToDebt:
          type: ["number", "null"]
        goodwillToAssets:
          type: ["number", "null"]
        intangibleToAssets:
          type: ["number", "null"]

    CapitalEfficiencySection:
      type: object
      properties:
        roic:
          type: ["number", "null"]
        assetTurnover:
          type: ["number", "null"]
        inventoryTurnover:
          type: ["number", "null"]
        receivablesTurnover:
          type: ["number", "null"]
        dso:
          type: ["number", "null"]
        dio:
          type: ["number", "null"]
        dpo:
          type: ["number", "null"]
        cashConversionCycle:
          type: ["number", "null"]

    ValuationMatrix:
      type: object
      required: [qualityScore, valuationScore, quadrant, label, labelIt]
      properties:
        qualityScore:
          type: number
        valuationScore:
          type: number
        quadrant:
          $ref: "#/components/schemas/ValuationQuadrant"
        label:
          type: string
        labelIt:
          type: string

    ValuationSection:
      type: object
      required: [pe, forwardPe, ps, pb, pFcf, evRevenue, evEbitda, evEbit, valuationMatrix]
      properties:
        pe:
          $ref: "#/components/schemas/ValuationMultiple"
        forwardPe:
          $ref: "#/components/schemas/ValuationMultiple"
        ps:
          $ref: "#/components/schemas/ValuationMultiple"
        pb:
          $ref: "#/components/schemas/ValuationMultiple"
        pFcf:
          $ref: "#/components/schemas/ValuationMultiple"
        evRevenue:
          $ref: "#/components/schemas/ValuationMultiple"
        evEbitda:
          $ref: "#/components/schemas/ValuationMultiple"
        evEbit:
          $ref: "#/components/schemas/ValuationMultiple"
        dividendYield:
          type: ["number", "null"]
        buybackYield:
          type: ["number", "null"]
        sharesOutstanding:
          type: ["number", "null"]
        dilution1y:
          type: ["number", "null"]
        dilution3y:
          type: ["number", "null"]
        valuationMatrix:
          $ref: "#/components/schemas/ValuationMatrix"

    PeerCompanyData:
      type: object
      required: [symbol, name]
      properties:
        symbol:
          type: string
        name:
          type: string
        marketCap:
          type: ["number", "null"]
        revenueGrowthYoy:
          type: ["number", "null"]
        grossMargin:
          type: ["number", "null"]
        operatingMargin:
          type: ["number", "null"]
        fcfMargin:
          type: ["number", "null"]
        roic:
          type: ["number", "null"]
        netDebtToEbitda:
          type: ["number", "null"]
        pe:
          type: ["number", "null"]
        evToEbitda:
          type: ["number", "null"]
        evToSales:
          type: ["number", "null"]
        priceToFcf:
          type: ["number", "null"]

    PeerComparisonSection:
      type: object
      required: [peers, peerGroupSize, excludedCount]
      properties:
        peers:
          type: array
          items:
            $ref: "#/components/schemas/PeerCompanyData"
        peerGroupSize:
          type: integer
        excludedCount:
          type: integer

    HistoricalDataPoint:
      type: object
      required: [year]
      properties:
        year:
          type: string
        value:
          type: ["number", "null"]

    HistoricalSection:
      type: object
      required: [revenue, operatingIncome, netIncome, eps, ocf, fcf, grossMargin, operatingMargin, netMargin, netDebt, sharesOutstanding]
      properties:
        revenue:
          type: array
          items:
            $ref: "#/components/schemas/HistoricalDataPoint"
        operatingIncome:
          type: array
          items:
            $ref: "#/components/schemas/HistoricalDataPoint"
        netIncome:
          type: array
          items:
            $ref: "#/components/schemas/HistoricalDataPoint"
        eps:
          type: array
          items:
            $ref: "#/components/schemas/HistoricalDataPoint"
        ocf:
          type: array
          items:
            $ref: "#/components/schemas/HistoricalDataPoint"
        fcf:
          type: array
          items:
            $ref: "#/components/schemas/HistoricalDataPoint"
        grossMargin:
          type: array
          items:
            $ref: "#/components/schemas/HistoricalDataPoint"
        operatingMargin:
          type: array
          items:
            $ref: "#/components/schemas/HistoricalDataPoint"
        netMargin:
          type: array
          items:
            $ref: "#/components/schemas/HistoricalDataPoint"
        netDebt:
          type: array
          items:
            $ref: "#/components/schemas/HistoricalDataPoint"
        sharesOutstanding:
          type: array
          items:
            $ref: "#/components/schemas/HistoricalDataPoint"

    RedFlag:
      type: object
      required: [key, titleEn, titleIt, severity, dataPoint, explanationEn, explanationIt, period]
      properties:
        key:
          type: string
        titleEn:
          type: string
        titleIt:
          type: string
        severity:
          type: string
          enum: [low, medium, high]
        dataPoint:
          type: string
        explanationEn:
          type: string
        explanationIt:
          type: string
        period:
          type: string

    FundamentalStrength:
      type: object
      required: [key, titleEn, titleIt, dataPoint, explanationEn, explanationIt]
      properties:
        key:
          type: string
        titleEn:
          type: string
        titleIt:
          type: string
        dataPoint:
          type: string
        explanationEn:
          type: string
        explanationIt:
          type: string

    AICatalyst:
      type: object
      required: [title, explanation, timeHorizon]
      properties:
        title:
          type: string
        explanation:
          type: string
        supportingData:
          type: string
        timeHorizon:
          type: string

    AIRisk:
      type: object
      required: [title, severity, explanation, metricToMonitor]
      properties:
        title:
          type: string
        severity:
          type: string
          enum: [high, medium, low]
        explanation:
          type: string
        metricToMonitor:
          type: string

    FundamentalExplanation:
      type: object
      required: [headline, ourTake, businessLine, valuationLine, momentumLine, mainRisk, catalysts, aiRisks, metricsToWatch, disclaimer]
      properties:
        headline:
          type: string
        ourTake:
          type: string
        businessLine:
          type: string
        valuationLine:
          type: string
        momentumLine:
          type: string
        mainRisk:
          type: string
        catalysts:
          type: array
          items:
            $ref: "#/components/schemas/AICatalyst"
        aiRisks:
          type: array
          items:
            $ref: "#/components/schemas/AIRisk"
        metricsToWatch:
          type: array
          items:
            type: string
        disclaimer:
          type: string

    PriceVsBusinessPoint:
      type: object
      required: [date, label]
      properties:
        date:
          type: string
        label:
          type: string
        price:
          type: ["number", "null"]
        epsTtm:
          type: ["number", "null"]
        revenuePerShare:
          type: ["number", "null"]
        fcfPerShare:
          type: ["number", "null"]

    PriceVsBusinessSection:
      type: object
      required: [available, points]
      properties:
        available:
          type: boolean
        points:
          type: array
          items:
            $ref: "#/components/schemas/PriceVsBusinessPoint"
        priceChange1y:
          type: ["number", "null"]
        priceChange3y:
          type: ["number", "null"]
        priceChange5y:
          type: ["number", "null"]

    NewsItem:
      type: object
      required: [title, publisher, link, publishedAt]
      properties:
        uuid:
          type: string
        title:
          type: string
        publisher:
          type: string
        link:
          type: string
        publishedAt:
          type: string
        thumbnail:
          type: ["string", "null"]

    NewsMomentumSection:
      type: object
      required: [available, items]
      properties:
        available:
          type: boolean
        items:
          type: array
          items:
            $ref: "#/components/schemas/NewsItem"

    DataConfidenceMatrix:
      type: object
      required: [financialStatements, historicalPrices, historicalValuation, peerData, newsData]
      properties:
        financialStatements:
          type: string
          enum: [high, medium, low]
        historicalPrices:
